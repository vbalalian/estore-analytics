name: CD

on:
  workflow_dispatch:
    inputs:
      force_full_rebuild:
        description: 'Run all phases unconditionally (skip change detection)'
        required: false
        type: boolean
        default: true
  push:
    branches: [ main ]
    paths:
      - 'dbt-project/**'
      - 'dagster-project/**'
      - 'omni/**'
      - '.github/workflows/cd.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Store previous commit for rollback
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.GCP_VM_HOST }}
        username: ${{ secrets.GCP_VM_USERNAME }}
        key: ${{ secrets.GCP_VM_SSH_KEY }}
        script: |
          cd ${{ vars.DEPLOY_PATH }}
          git rev-parse HEAD > /tmp/previous_commit
          echo "Stored current commit for potential rollback: $(cat /tmp/previous_commit)"

    - name: Deploy to GCP VM
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.GCP_VM_HOST }}
        username: ${{ secrets.GCP_VM_USERNAME }}
        key: ${{ secrets.GCP_VM_SSH_KEY }}
        script: |
          set -e
          DEPLOY_START=$(date +%s)
          FORCE="${{ github.event.inputs.force_full_rebuild }}"

          cd ${{ vars.DEPLOY_PATH }}

          echo "=== PHASE: git pull ==="
          PHASE_START=$(date +%s)
          git pull origin main
          echo "TIMING: git_pull=$(($(date +%s) - PHASE_START))s"

          source .venv/bin/activate

          echo "=== Change detection ==="
          DBT_CHANGED=false
          OMNI_STATE_CHANGED=false

          if [ "$FORCE" = "true" ]; then
            echo "force_full_rebuild=true — running all phases"
            DBT_CHANGED=true
            OMNI_STATE_CHANGED=true
          else
            if git diff --name-only HEAD~1 HEAD | grep -q '^dbt-project/'; then
              DBT_CHANGED=true
              echo "dbt files changed"
            fi
            if git diff --name-only HEAD~1 HEAD | grep -qE '^(dagster-project/src/dagster_project/defs/omni_ingest/|dagster-project/src/dagster_project/components/|dbt-project/models/|omni/BigQuery/)'; then
              OMNI_STATE_CHANGED=true
              echo "Omni-related files changed"
            fi
          fi
          echo "CHANGE_DETECTION: dbt=$DBT_CHANGED omni_state=$OMNI_STATE_CHANGED force=$FORCE"

          if [ "$DBT_CHANGED" = true ]; then
            cd ${{ vars.DEPLOY_PATH }}/dbt-project

            echo "=== PHASE: dbt clean ==="
            PHASE_START=$(date +%s)
            dbt clean
            echo "TIMING: dbt_clean=$(($(date +%s) - PHASE_START))s"

            echo "=== PHASE: dbt deps ==="
            PHASE_START=$(date +%s)
            dbt deps
            echo "TIMING: dbt_deps=$(($(date +%s) - PHASE_START))s"

            echo "=== PHASE: dbt compile ==="
            PHASE_START=$(date +%s)
            dbt compile
            echo "TIMING: dbt_compile=$(($(date +%s) - PHASE_START))s"
          else
            echo "No dbt changes — skipping dbt pipeline"
          fi

          cd ${{ vars.DEPLOY_PATH }}/dagster-project

          echo "=== PHASE: dependency check ==="
          PHASE_START=$(date +%s)
          DEPS_CHANGED=false
          if git diff --name-only HEAD~1 HEAD | grep -E '(^|/)pyproject.toml$|(^|/)requirements.txt$'; then
            echo "Dependencies changed — upgrading environment..."
            ~/.local/bin/uv pip install --upgrade -e .[dev]
            DEPS_CHANGED=true
          fi
          echo "TIMING: dep_check_install=$(($(date +%s) - PHASE_START))s (deps_changed=$DEPS_CHANGED)"

          if [ "$DBT_CHANGED" = true ]; then
            echo "=== PHASE: dagster-dbt prepare-and-package ==="
            PHASE_START=$(date +%s)
            dagster-dbt project prepare-and-package --components .
            echo "TIMING: prepare_and_package=$(($(date +%s) - PHASE_START))s"
          else
            echo "No dbt changes — skipping prepare-and-package"
          fi

          if [ "$OMNI_STATE_CHANGED" = true ]; then
            echo "=== PHASE: refresh-defs-state ==="
            PHASE_START=$(date +%s)
            OMNI_API_KEY="${{ secrets.OMNI_API_KEY }}" \
            OMNI_BASE_URL="${{ secrets.OMNI_BASE_URL }}" \
              dg utils refresh-defs-state
            echo "TIMING: refresh_defs_state=$(($(date +%s) - PHASE_START))s"
          else
            echo "No Omni-related changes — skipping refresh-defs-state"
          fi

          echo "=== PHASE: service reload ==="
          PHASE_START=$(date +%s)
          if [ "$DEPS_CHANGED" = true ]; then
            echo "Restarting Dagster services..."
            sudo systemctl restart dagster-webserver
            sudo systemctl restart dagster
          else
            echo "Reloading code definitions..."
            curl -X POST \
              -H "Content-Type: application/json" \
              -d '{"query": "mutation { reloadWorkspace { __typename } }"}' \
              http://localhost:3000/graphql
          fi
          echo "TIMING: service_reload=$(($(date +%s) - PHASE_START))s"

          if [ "$DBT_CHANGED" = true ]; then
            echo "=== PHASE: upload manifest ==="
            PHASE_START=$(date +%s)
            gcloud auth activate-service-account --key-file=${{ vars.DEPLOY_PATH }}/.gcp/keyfile.json
            gcloud storage cp ${{ vars.DEPLOY_PATH }}/dbt-project/target/manifest.json \
              gs://${{ secrets.GCS_ARTIFACTS_BUCKET }}/dbt/manifest.json
            echo "TIMING: upload_manifest=$(($(date +%s) - PHASE_START))s"
          else
            echo "No dbt changes — skipping manifest upload"
          fi

          echo ""
          echo "=== TIMING SUMMARY ==="
          echo "TIMING: total_deploy=$(($(date +%s) - DEPLOY_START))s"
          echo "Deployment complete!"

    - name: Refresh Omni schema
      id: omni_refresh
      if: success()
      continue-on-error: true
      run: |
        if ! git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- dbt-project/models/ | grep -q .; then
          echo "No dbt model changes — skipping Omni schema refresh."
          echo "omni_refresh_result=skipped" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "dbt model changes detected — refreshing Omni schema..."
        RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
          "${{ secrets.OMNI_BASE_URL }}/api/v1/models/${{ secrets.OMNI_MODEL_ID }}/refresh" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${{ secrets.OMNI_API_KEY }}")

        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | sed '$d')

        if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
          echo "Omni API returned HTTP $HTTP_CODE: $BODY"
          echo "omni_refresh_result=failed" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        JOB_ID=$(echo "$BODY" | jq -r '.jobId')
        if [ -z "$JOB_ID" ] || [ "$JOB_ID" = "null" ]; then
          echo "Failed to extract jobId from response: $RESPONSE"
          echo "omni_refresh_result=failed" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        echo "Omni refresh triggered (jobId: $JOB_ID). Polling for completion..."

        MAX_ATTEMPTS=30
        POLL_INTERVAL=10
        for i in $(seq 1 $MAX_ATTEMPTS); do
          STATUS_RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${{ secrets.OMNI_BASE_URL }}/api/v1/jobs/${JOB_ID}/status" \
            -H "Authorization: Bearer ${{ secrets.OMNI_API_KEY }}")
          
          STATUS_HTTP=$(echo "$STATUS_RESPONSE" | tail -1)
          STATUS_BODY=$(echo "$STATUS_RESPONSE" | sed '$d')
          
          if [ "$STATUS_HTTP" -lt 200 ] || [ "$STATUS_HTTP" -ge 300 ]; then
            echo "Omni status API returned HTTP $STATUS_HTTP: $STATUS_BODY"
            echo "omni_refresh_result=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          
          STATUS=$(echo "$STATUS_BODY" | jq -r '.status')

          if [ "$STATUS" = "COMPLETED" ]; then
            echo "Omni schema refresh completed successfully."
            echo "omni_refresh_result=completed" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ "$STATUS" = "FAILED" ]; then
            echo "Omni schema refresh failed: $STATUS_RESPONSE"
            echo "omni_refresh_result=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Attempt $i/$MAX_ATTEMPTS — status: $STATUS. Waiting ${POLL_INTERVAL}s..."
          sleep $POLL_INTERVAL
        done

        echo "Omni schema refresh timed out after $((MAX_ATTEMPTS * POLL_INTERVAL))s."
        echo "omni_refresh_result=timeout" >> "$GITHUB_OUTPUT"
        exit 1

    - name: Notify Slack - Omni Refresh Failed
      if: |
        steps.omni_refresh.outcome == 'failure' ||
        steps.omni_refresh.outputs.omni_refresh_result == 'failed' ||
        steps.omni_refresh.outputs.omni_refresh_result == 'timeout'
      continue-on-error: true
      uses: slackapi/slack-github-action@v2.0.0
      with:
        method: chat.postMessage
        token: ${{ secrets.SLACK_BOT_TOKEN }}
        payload: |
          channel: "#estore-alerts"
          text: "Omni schema refresh ${{ steps.omni_refresh.outputs.omni_refresh_result }}"
          blocks:
            - type: section
              text:
                type: mrkdwn
                text: ":warning: *Omni Schema Refresh ${{ steps.omni_refresh.outputs.omni_refresh_result == 'failed' && 'Failed' || 'Timed Out' }}*\n\n*Repo:* ${{ github.repository }}\n*Commit:* `${{ github.sha }}`\n*By:* ${{ github.actor }}"
            - type: actions
              elements:
                - type: button
                  text:
                    type: plain_text
                    text: View Run
                  url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Health check - Dagster webserver
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.GCP_VM_HOST }}
        username: ${{ secrets.GCP_VM_USERNAME }}
        key: ${{ secrets.GCP_VM_SSH_KEY }}
        script: |
          set -e

          echo "Checking Dagster webserver..."

          if ! systemctl is-active --quiet dagster-webserver; then
            echo "Dagster webserver is not running!"
            sudo systemctl status dagster-webserver --no-pager
            exit 1
          fi
          echo "Dagster webserver is running."

          MAX_RETRIES=12
          RETRY_DELAY=5

          for i in $(seq 1 $MAX_RETRIES); do
            if curl -sf http://localhost:3000/server_info > /dev/null 2>&1; then
              echo "Dagster webserver HTTP endpoint is healthy."
              exit 0
            fi
              echo "Attempt $i/$MAX_RETRIES - waiting ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
          done

          echo "Dagster webserver HTTP endpoint is not responding!"
          exit 1

    - name: Health check - Dagster daemon
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.GCP_VM_HOST }}
        username: ${{ secrets.GCP_VM_USERNAME }}
        key: ${{ secrets.GCP_VM_SSH_KEY }}
        script: |
          set -e

          echo "Checking Dagster daemon..."

          if ! systemctl is-active --quiet dagster; then
            echo "Dagster daemon is not running!"
            sudo systemctl status dagster --no-pager
            exit 1
          fi
          echo "Dagster daemon is running."

    - name: Cleanup on success
      if: success()
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.GCP_VM_HOST }}
        username: ${{ secrets.GCP_VM_USERNAME }}
        key: ${{ secrets.GCP_VM_SSH_KEY }}
        script: |
          rm -f /tmp/previous_commit

    - name: Notify Slack - Deploy Success
      if: success()
      continue-on-error: true
      uses: slackapi/slack-github-action@v2.0.0
      with:
        method: chat.postMessage
        token: ${{ secrets.SLACK_BOT_TOKEN }}
        payload: |
          channel: "#estore-alerts"
          text: "Deployment successful"
          blocks:
            - type: section
              text:
                type: mrkdwn
                text: ":white_check_mark: *Deployment Successful*\n\n*Repo:* ${{ github.repository }}\n*Commit:* `${{ github.sha }}`\n*By:* ${{ github.actor }}"
            - type: actions
              elements:
                - type: button
                  text:
                    type: plain_text
                    text: View Run
                  url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  rollback:
    needs: deploy
    runs-on: ubuntu-latest
    if: failure()

    steps:
    - name: Rollback to previous commit
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.GCP_VM_HOST }}
        username: ${{ secrets.GCP_VM_USERNAME }}
        key: ${{ secrets.GCP_VM_SSH_KEY }}
        script: |
          set -e

          cd ${{ vars.DEPLOY_PATH }}
          
          if [ ! -f /tmp/previous_commit ]; then
            echo "No previous commit found for rollback!"
            exit 1
          fi

          PREVIOUS_COMMIT=$(cat /tmp/previous_commit)
          CURRENT_COMMIT=$(git rev-parse HEAD)

          echo "Rolling back..."
          echo "From: $CURRENT_COMMIT" 
          echo "To:   $PREVIOUS_COMMIT"

          git reset --hard $PREVIOUS_COMMIT

          source .venv/bin/activate

          cd ${{ vars.DEPLOY_PATH }}/dbt-project
          dbt clean
          dbt deps
          dbt compile

          cd ${{ vars.DEPLOY_PATH }}/dagster-project
          ~/.local/bin/uv pip install --upgrade -e .[dev]

          dagster-dbt project prepare-and-package --components .
          sudo systemctl restart dagster-webserver
          sudo systemctl restart dagster

          sleep 5

          if systemctl is-active --quiet dagster-webserver && systemctl is-active --quiet dagster; then
            echo "Rollback successful, services are running."
          else
            echo "Rollback completed, but services may not be running correctly."
            exit 1
          fi

    - name: Cleanup rollback file
      if: always()
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.GCP_VM_HOST }}
        username: ${{ secrets.GCP_VM_USERNAME }}
        key: ${{ secrets.GCP_VM_SSH_KEY }}
        script: |
          rm -f /tmp/previous_commit

    - name: Notify Slack - Rollback
      if: always()
      continue-on-error: true
      uses: slackapi/slack-github-action@v2.0.0
      with:
        method: chat.postMessage
        token: ${{ secrets.SLACK_BOT_TOKEN }}
        payload: |
          channel: "#estore-alerts"
          text: "Deployment failed - rollback attempted"
          blocks:
            - type: section
              text:
                type: mrkdwn
                text: ":rotating_light: *Deployment Failed - Rollback ${{ job.status }}*\n\n*Repo:* ${{ github.repository }}\n*Commit:* `${{ github.sha }}`\n*By:* ${{ github.actor }}"
            - type: actions
              elements:
                - type: button
                  text:
                    type: plain_text
                    text: View Run
                  url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
